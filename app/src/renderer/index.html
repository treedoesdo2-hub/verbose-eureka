<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PAYROLL</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP
         font-src + style-src expanded for Google Fonts (Chakra Petch, IBM Plex
         Sans, IBM Plex Mono) — see ADR 016 §Q14j. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
