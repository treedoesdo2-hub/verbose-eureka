<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920" />
    <title>PAYROLL · capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { margin: 0; padding: 0; background: #0a0d12; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      #root { position: absolute; inset: 0; }
      #stage {
        position: absolute; top: 0; left: 0;
        width: 1920px; height: 1080px;
        transform-origin: top left;
      }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Stub design-canvas so primitives that reference DCArtboard etc don't crash; we render screens directly. -->
    <script type="text/babel">
      // Minimal stubs so any stray DC* references don't throw.
      window.DesignCanvas = ({children}) => <div>{children}</div>;
      window.DCSection = ({children}) => <div>{children}</div>;
      window.DCArtboard = ({children}) => <div>{children}</div>;
    </script>
    <script type="text/babel" src="primitives.jsx"></script>
    <script type="text/babel" src="s1-menu.jsx"></script>
    <script type="text/babel" src="s2-combat.jsx"></script>
    <script type="text/babel" src="s3-armory.jsx"></script>
    <script type="text/babel" src="s4-contracts.jsx"></script>
    <script type="text/babel" src="s5-briefing.jsx"></script>
    <script type="text/babel" src="s6-debrief.jsx"></script>
    <script type="text/babel" src="s7-orbat.jsx"></script>
    <script type="text/babel" src="s8-command.jsx"></script>
    <script type="text/babel" src="s9-theater.jsx"></script>
    <script type="text/babel">
      const SCREENS = {
        menu: () => <NeonwireMainMenu />,
        combat: () => <NeonwireCombat />,
        armory: () => <NeonwireArmory />,
        contracts: () => <NeonwireContracts />,
        briefing: () => <NeonwireBriefing />,
        debrief: () => <NeonwireDebrief />,
        orbat: () => <NeonwireOrbat />,
        command: () => <NeonwireCommand />,
        theater: () => <NeonwireTheater />,
      };
      function pick() {
        const k = (location.hash || '#menu').slice(1);
        const Comp = SCREENS[k] || SCREENS.menu;
        return <div id="stage"><Comp /></div>;
      }
      function App() {
        const [, force] = React.useReducer(x=>x+1,0);
        React.useEffect(() => {
          const onHash = () => force();
          window.addEventListener('hashchange', onHash);
          return () => window.removeEventListener('hashchange', onHash);
        }, []);
        return pick();
      }
      // Continuously fit the 1920×1080 stage into the viewport.
      function fit() {
        const s = document.getElementById('stage');
        if (!s) return;
        const sx = window.innerWidth / 1920;
        const sy = window.innerHeight / 1080;
        const k = Math.min(sx, sy);
        s.style.transform = `scale(${k})`;
        // center
        const w = 1920 * k, h = 1080 * k;
        s.style.left = ((window.innerWidth - w) / 2) + 'px';
        s.style.top  = ((window.innerHeight - h) / 2) + 'px';
      }
      window.addEventListener('resize', fit);
      const fitInterval = setInterval(fit, 250);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
